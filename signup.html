<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body {
  background: #111;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
}
.box {
  background: #222;
  padding: 30px;
  border-radius: 10px;
  text-align: center;
}
input {
  margin: 10px;
  padding: 10px;
  width: 200px;
}
button {
  padding: 10px;
  background: #ffd369;
  border: none;
}
</style>
</head>

<body>

<div class="box">
  <h2>Create Account</h2>
  <input id="user" placeholder="Username"><br>
  <p id="loginErr" style="color:red; font-size:14px;"></p>
  <input id="pass" type="password" placeholder="Password"><br>
  <p id="passError" style="color:red; font-size:14px;"></p>
  <button onclick="signup()">Signup</button>
</div>

<script>

async function signup() {
  const username = document.getElementById("user").value.trim();
  const password = document.getElementById("pass").value.trim();

const loginErr = document.getElementById("loginErr");
loginErr.innerText = "";

if (!username || !password) {
  loginErr.innerText = "Fill all fields";
  return;
}


const passError = document.getElementById("passError");
passError.innerText = "";

if (password.length < 4) {
  passError.innerText = "Password must be at least 4 characters";
  return;
}

  try {
   
 const res = await fetch("https://food-app-7r0i.onrender.com/register", {

      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

if (data.success) {
  alert("Account created ");
  window.location.href = "login.html";
} else {
  alert(data.message);
}

  } catch (err) {
    console.log(err);
    alert("Server error ");
  }
}

</script>
</body>
</html>
