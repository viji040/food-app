<!DOCTYPE html>
<html>
<head>
  <title>Cart</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }

    .item {
      display: flex;
      align-items: center;
      background: #222;
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
    }

    .item img {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      margin-right: 10px;
    }

    button {
      margin-left: auto;
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
    }
  </style>
</head>

<body>

<h1>🛒 Your Cart</h1>

<div id="cart-items"></div>
<h2 id="total"></h2>

 <button onclick="goToPayment()">Proceed to Payment</button>
<script>
const cartDiv = document.getElementById("cart-items");
const totalEl = document.getElementById("total");

const currentUser = localStorage.getItem("currentUser");

if (!currentUser) {
  alert("Login first 😒");
  window.location.href = "login.html";
}

let cart = [];
let selectedItems = [];

async function loadCart() {
  try {
    const res = await fetch(
      `https://food-app-7r0i.onrender.com/cart/${currentUser}`
    );

    cart = await res.json();

    displayCart();

  } catch (err) {
    console.log(err);
    alert("Error loading cart 😭");
  }
}

function displayCart() {
  cartDiv.innerHTML = "";

  if (cart.length === 0) {
    cartDiv.innerHTML = "<p>Your cart is empty 😒</p>";
    return;
  }

  cart.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <input type="checkbox" onchange="toggleSelect(${index}, this)">
      <img src="${item.image}">
     

<p>${item.foodName} - ₹${item.price}</p>

<div class="qty-box">
  <button onclick="updateQuantity('${item._id}', 'minus')">−</button>
  <span>${item.quantity}</span>
  <button onclick="updateQuantity('${item._id}', 'plus')">+</button>
</div>

      <button onclick="removeItem('${item._id}')">❌</button>
    `;

    cartDiv.appendChild(div);
  });
}

loadCart();


async function removeItem(id) {
  try {
    await fetch(
      `https://food-app-7r0i.onrender.com/cart/${id}`,
      {
        method: "DELETE"
      }
    );

    loadCart();

  } catch (err) {
    console.log(err);
    alert("Delete failed 😭");
  }
}


async function updateQuantity(id, action) {
  try {
    await fetch(
      `https://food-app-7r0i.onrender.com/cart/${id}`,
      {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ action })
      }
    );

    loadCart();

  } catch (err) {
    console.log(err);
    alert("Quantity update failed ");
  }
}

// ✅ SELECT ITEMS
function toggleSelect(index, checkbox) {
  if (checkbox.checked) {
    selectedItems.push(cart[index]);
  } else {
    selectedItems = selectedItems.filter(item => item !== cart[index]);
  }

  updateTotal();
}

// 💰 UPDATE TOTAL (ONLY SELECTED)
function updateTotal() {
  let total = 0;

  selectedItems.forEach(item => {
    total += item.price;
  });

  totalEl.textContent = "Total: ₹" + total;
}

// 🚀 GO TO PAYMENT (ONLY SELECTED)
function goToPayment() {
  if (selectedItems.length === 0) {
    alert("Select items first 😒");
    return;
  }

  localStorage.setItem("selectedCart", JSON.stringify(selectedItems));

  window.location.href = "payment.html";
}

</script>
</body>
</html>
